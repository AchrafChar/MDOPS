name: MDOPS CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ─── JOB 1 : Build Backend ───
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build JAR
        working-directory: mdops-backend
        run: mvn clean package -DskipTests

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Docker image backend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/mdops-backend:latest ./mdops-backend
          docker push ${{ secrets.DOCKER_USERNAME }}/mdops-backend:latest

  # ─── JOB 2 : Build Frontend ───
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node 20
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: mdops-frontend
        run: npm install

      - name: Build Angular
        working-directory: mdops-frontend
        run: npx ng build --configuration production --no-prerender

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Docker image frontend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/mdops-frontend:latest ./mdops-frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/mdops-frontend:latest

# ─── JOB 3 : Deploy sur Kubernetes ───
  deploy:
      runs-on: self-hosted
      needs: [build-backend, build-frontend]
      steps:
        - name: Checkout code
          uses: actions/checkout@v3

        - name: Deploy sur Kubernetes
          run: |
            kubectl rollout restart deployment mdops-backend -n mdops
            kubectl rollout restart deployment mdops-frontend -n mdops
            kubectl rollout status deployment mdops-backend -n mdops
            kubectl rollout status deployment mdops-frontend -n mdops