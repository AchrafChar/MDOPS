name: MDOPS CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ─── JOB 1 : Build Backend ───
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build JAR
        run: |
          cd mdops-backend
          mvn clean package -DskipTests

      - name: Build Docker image backend
        run: |
          docker build -t mdops-backend:latest ./mdops-backend

  # ─── JOB 2 : Build Frontend ───
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node 20
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd mdops-frontend
          npm install

      - name: Build Angular
        run: |
          cd mdops-frontend
          npx ng build --configuration production

      - name: Build Docker image frontend
        run: |
          docker build -t mdops-frontend:latest ./mdops-frontend

  # ─── JOB 3 : Tests ───
  test-backend:
    runs-on: ubuntu-latest
    needs: build-backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Run tests
        run: |
          cd mdops-backend
          mvn test