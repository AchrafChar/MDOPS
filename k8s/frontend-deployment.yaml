apiVersion: apps/v1
kind: Deployment
metadata:
  name: mdops-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mdops-frontend
  template:
    metadata:
      labels:
        app: mdops-frontend
    spec:
      containers:
        - name: mdops-frontend
          image: mdops-frontend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: mdops-frontend
spec:
  type: NodePort
  selector:
    app: mdops-frontend
  ports:
    - port: 80
      nodePort: 30080