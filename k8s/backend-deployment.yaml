apiVersion: apps/v1
kind: Deployment
metadata:
  name: mdops-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mdops-backend
  template:
    metadata:
      labels:
        app: mdops-backend
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox
          command: ['sh', '-c', 'until nc -z mdops-postgres 5434; do echo "Waiting for postgres..."; sleep 2; done']
      containers:
        - name: mdops-backend
          image: mdops-backend:latest
          imagePullPolicy: Never
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://mdops-postgres:5434/mdops
            - name: SPRING_DATASOURCE_USERNAME
              value: achraf
            - name: SPRING_DATASOURCE_PASSWORD
              value: achraf
          ports:
            - containerPort: 8085
---
apiVersion: v1
kind: Service
metadata:
  name: mdops-backend
spec:
  type: NodePort
  selector:
    app: mdops-backend
  ports:
    - port: 8085
      nodePort: 30085